worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"remote_addr":"$remote_addr",'
            '"upstream_response_time":"$upstream_response_time"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json text/event-stream;
    gzip_min_length 256;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    server_tokens off;

    # ── Rate limiting zones ───────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=research:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream backends ─────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── Main server ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Redirect HTTP → HTTPS in production (uncomment when certs are available)
        # return 301 https://$host$request_uri;

        # ── Frontend ──────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        # ── API (non-streaming) ───────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 360s;
            proxy_send_timeout 60s;
        }

        # ── SSE streaming endpoint — CRITICAL: disable buffering ─────────
        location ~ ^/api/v1/research/.+/stream$ {
            limit_req zone=research burst=3 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';

            # Disable ALL buffering for SSE — events must reach client immediately
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;

            # SSE content type headers
            add_header Content-Type text/event-stream;
            add_header Cache-Control no-cache;
            add_header X-Accel-Buffering no;
        }

        # ── Health probes (no rate limit) ─────────────────────────────────
        location /health {
            proxy_pass http://backend;
            access_log off;
        }

        location /ready {
            proxy_pass http://backend;
            access_log off;
        }

        # ── Metrics (restrict to internal network in production) ──────────
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://backend;
        }
    }
}
